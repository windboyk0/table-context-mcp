<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Context Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: float 10s infinite ease-in-out alternate;
        }
        .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: #3b82f6; }
        .blob-2 { bottom: -10%; right: -10%; width: 600px; height: 600px; background: #8b5cf6; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Glassmorphism Panel */
        .panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .panel:nth-child(2) { animation-delay: 0.2s; }
        .panel:nth-child(3) { animation-delay: 0.4s; }

        /* Upload Area */
        .upload-area {
            border: 2px dashed rgba(148, 163, 184, 0.3);
            border-radius: 1rem;
            padding: 3rem 2rem;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--accent);
            background: rgba(59, 130, 246, 0.1);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .upload-area p {
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
            font-family: inherit;
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        .btn.outline {
            background: transparent;
            border: 1px solid var(--text-secondary);
            color: var(--text-primary);
        }

        .btn.outline:hover {
            border-color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            box-shadow: none;
        }
        
        .btn.small {
            padding: 0.4rem 0.8rem;
            font-size: 0.875rem;
        }

        /* Table List */
        .table-list {
            display: grid;
            gap: 1rem;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        }

        .table-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .table-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .table-card h3 {
            font-size: 1.2rem;
            font-weight: 600;
            word-break: break-all;
        }

        .table-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: var(--bg-color);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            transform: scale(0.95);
            transition: transform 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            flex-grow: 1;
        }

        /* JSON Display */
        pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            color: #a78bfa;
        }
        
        /* Loading overlay */
        .loading {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10;
        }
        .loading.active {
            opacity: 1;
            pointer-events: all;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <header>
            <h1>Table Context Manager</h1>
            <p class="subtitle">Upload DB Excel Definitions to Sync with LLM MCP Context</p>
        </header>

        <section class="panel upload-panel">
            <div class="loading" id="uploadLoading">
                <div class="spinner"></div>
                <p style="margin-top: 1rem;">Parsing Excel...</p>
            </div>
            <h2 style="margin-bottom: 1rem;">Upload Definition</h2>
            <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📄</div>
                <p>Drag & Drop your .xlsx file here</p>
                <p style="font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 1.5rem;">or</p>
                <button class="btn" style="pointer-events: none;">Browse File</button>
                <input type="file" id="fileInput" accept=".xlsx" onchange="handleFileSelect(event)">
            </div>
            <div id="uploadStatus" style="margin-top: 1rem; text-align: center; opacity: 0; transition: opacity 0.3s;"></div>
        </section>

        <section class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2>Parsed Tables</h2>
                <button class="btn outline small" onclick="loadTables()">Refresh</button>
            </div>
            <div class="table-list" id="tableList">
                <!-- Cards will be injected here -->
            </div>
            <div id="emptyState" style="text-align: center; padding: 2rem; color: var(--text-secondary); display: none;">
                No tables parsed yet. Upload an excel file above.
            </div>
        </section>
    </div>

    <!-- Modal -->
    <div class="modal" id="jsonModal" onclick="if(event.target===this) closeModal()">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Table JSON Schema</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <pre id="jsonPreview">Loading...</pre>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadTables();
            
            // Drag and Drop Logic
            const dropZone = document.getElementById('dropZone');
            
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
            });
            
            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
            });
            
            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
            });
            
            dropZone.addEventListener('drop', handleDrop, false);
        });

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            if(files.length) {
                uploadFile(files[0]);
            }
        }
        
        function handleFileSelect(e) {
            if(e.target.files.length) {
                uploadFile(e.target.files[0]);
                e.target.value = ''; // reset
            }
        }

        async function uploadFile(file) {
            if (!file.name.endsWith('.xlsx')) {
                showStatus('Only .xlsx files are allowed.', 'danger');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            const loading = document.getElementById('uploadLoading');
            loading.classList.add('active');

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    showStatus('File successfully parsed and saved.', 'success');
                    loadTables();
                } else {
                    const err = await response.json();
                    showStatus(`Error: ${err.detail}`, 'danger');
                }
            } catch (error) {
                showStatus(`Network Error: ${error.message}`, 'danger');
            } finally {
                loading.classList.remove('active');
            }
        }

        function showStatus(text, type) {
            const statusEl = document.getElementById('uploadStatus');
            statusEl.textContent = text;
            statusEl.style.color = `var(--${type})`;
            statusEl.style.opacity = 1;
            setTimeout(() => {
                statusEl.style.opacity = 0;
            }, 5000);
        }

        async function loadTables() {
            try {
                const res = await fetch('/api/tables');
                const tables = await res.json();
                renderTableList(tables);
            } catch (err) {
                console.error("Failed to load tables", err);
            }
        }

        function renderTableList(tables) {
            const listEl = document.getElementById('tableList');
            const emptyState = document.getElementById('emptyState');

            listEl.innerHTML = '';

            if (!tables || tables.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            tables.forEach(table => {
                const card = document.createElement('div');
                card.className = 'table-card';

                const h3 = document.createElement('h3');
                h3.textContent = table;

                const actions = document.createElement('div');
                actions.className = 'table-actions';

                const viewBtn = document.createElement('button');
                viewBtn.className = 'btn small';
                viewBtn.textContent = 'View Schema';
                viewBtn.addEventListener('click', () => viewJson(table));

                const jsonLink = document.createElement('a');
                jsonLink.href = `/download/json/${encodeURIComponent(table)}`;
                jsonLink.className = 'btn outline small';
                jsonLink.textContent = 'JSON';
                jsonLink.target = '_blank';

                const excelLink = document.createElement('a');
                excelLink.href = `/download/excel/${encodeURIComponent(table)}`;
                excelLink.className = 'btn outline small';
                excelLink.textContent = 'Excel';
                excelLink.target = '_blank';

                actions.appendChild(viewBtn);
                actions.appendChild(jsonLink);
                actions.appendChild(excelLink);
                card.appendChild(h3);
                card.appendChild(actions);
                listEl.appendChild(card);
            });
        }

        async function viewJson(tableName) {
            const modal = document.getElementById('jsonModal');
            const preview = document.getElementById('jsonPreview');
            const title = document.getElementById('modalTitle');
            
            title.textContent = `${tableName}.json`;
            preview.textContent = 'Loading...';
            modal.classList.add('active');
            
            try {
                const res = await fetch(`/api/tables/${encodeURIComponent(tableName)}`);
                const data = await res.json();
                preview.textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                preview.textContent = 'Error loading json';
            }
        }

        function closeModal() {
            const modal = document.getElementById('jsonModal');
            modal.classList.remove('active');
        }
    </script>
</body>
</html>
